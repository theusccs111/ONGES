name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  IMAGE_API_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/onges-campaign-api
  IMAGE_CONSUMER_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/onges-campaign-consumer

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  docker-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ONGES.Campaign.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API_NAME }}:latest
            ${{ env.IMAGE_API_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Consumer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ONGES.Campaign.Consumer/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_CONSUMER_NAME }}:latest
            ${{ env.IMAGE_CONSUMER_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
